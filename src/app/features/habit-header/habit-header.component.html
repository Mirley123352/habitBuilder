<header class="app-header">

  <div class="header-top">
    <div class="date-block">
      <span class="day-name">{{ today | date:'EEEE' }}</span>
      <span class="date-full">{{ today | date:'MMMM d, y' }}</span>
    </div>
    <div class="streak-badge">
      <span>🔥</span>
      <span class="streak-count">{{ overallStreak }}</span>
      <span class="streak-label">day streak</span>
    </div>
  </div>

  <div class="weekly-progress">
    <div class="progress-header">
      <span class="progress-label">Weekly Progress</span>
      <span class="progress-pct">{{ progressPct | number:'1.0-0' }}%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" [style.width.%]="progressPct"></div>
    </div>
  </div>

  <div class="category-tabs">
    <button
      *ngFor="let cat of categories"
      class="cat-tab"
      [class.active]="activeCategory === cat.value"
      (click)="setCategory(cat.value)"
    >
      <span>{{ cat.icon }}</span>
      <span>{{ cat.label }}</span>
    </button>
  </div>

</header>
